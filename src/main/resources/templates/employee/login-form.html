<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — RoleBase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/forms.css}"/>
</head>
<body class="auth-page">

<div class="form-card">
    <h1 class="form-title">Welcome back</h1>
    <p class="form-subtitle">Login to your account</p>

    <p th:if="${error}" th:text="${error}" class="msg-error"></p>
    <p th:if="${credentialsError}" th:text="${credentialsError}" class="msg-error"></p>

    <!-- Redirect Attribute is passed and checked here-->
    <p th:if="${successMessage}" th:text="${successMessage}" class="msg-success"></p>

    <form th:action="@{/employee/loginUser}" th:object="${user}" method="POST">
        <div class="field">
            <label>Email</label>
            <input type="text" th:field="*{email}" placeholder="you@gmail.com"/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter your password"/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
        </div>
        <div class="field">
            <label>Role</label>
            <select th:field="*{role}">
                <option value="">Select a role</option>
                <option value="ADMIN">Admin</option>
                <option value="HR">HR</option>
                <option value="MANAGER">Manager</option>
                <option value="EMPLOYEE">Employee</option>
            </select>
        </div>
        <input type="submit" class="btn-primary" value="Login"/>

        <!-- Redirects to the sign-up page if not registered -->
        <p class="form-footer">Don't have an account? <a th:href="@{/employee/register}">Register</a></p>
    </form>
</div>

</body>
</html>

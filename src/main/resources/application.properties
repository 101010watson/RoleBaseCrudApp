spring.application.name=crudapp
spring.datasource.url=jdbc:mysql://localhost:3306/project
spring.datasource.username=employeedb
spring.datasource.password=employeedb

# Turn off the spring boot banner
spring.main.banner-mode=off

# Reduce logging level. Set logging level to warn
logging.level.root=warn

# Add logging configs to display SQL statements
logging.level.org.hibernate.SQL=debug
# the above line log SQL statements
logging.level.org.hibernate.orm.jdbc.bind=trace
# the above line log values for SQL statements

# add the JPA/Hibernate to auto create the table
spring.jpa.hibernate.ddl-auto=update
# the update command will not delete it just updates the entries in the existing table

# this basically tells the hibernate that we are communicating with the MYSQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# spring.jpa.hibernate.ddl-auto=create will drop the existing table and create new one

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration